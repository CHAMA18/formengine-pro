# ===========================================
# FormEngine Pro — Docker Compose
# ===========================================
# Spins up PostgreSQL + the FormEngine Pro app with one command.
#
# Usage:
#   docker-compose up              # Start both services
#   docker-compose up -d           # Start in background (detached)
#   docker-compose down            # Stop and remove containers
#   docker-compose down -v         # Also delete the database volume
#
# The app will be available at: http://localhost:3000
# PostgreSQL will be available at: localhost:5432

services:
  # --- PostgreSQL Database ---
  db:
    image: postgres:16-alpine
    container_name: formengine-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fep
      POSTGRES_PASSWORD: fep_password
      POSTGRES_DB: formengine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fep -d formengine"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # --- FormEngine Pro App ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: formengine-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Use the Docker-internal hostname "db" to reach PostgreSQL
      DATABASE_URL: "postgresql://fep:fep_password@db:5432/formengine?schema=public"
      NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL:-https://placeholder.supabase.co}"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-placeholder-anon-key}"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    # Wait for DB to be healthy, then the entrypoint runs migrations + starts server

volumes:
  postgres_data:
    driver: local
